# trivy ignore config — see https://aquasecurity.github.io/trivy/latest/docs/configuration/filtering/
#
# Path-scoped suppressions only: a finding must remain blocked everywhere
# else, so the gate keeps catching new Dockerfile regressions.

misconfigurations:
  # DS-0002: "Image user should not be 'root'"
  #   The two scoped paths below are *build-only* intermediate base images —
  #   downstream Dockerfile.dev's inherit from them and need root for
  #   workspace pnpm installs, then drop to USER node before their CMD.
  #   Adding USER here would break the dev container path. Every runtime
  #   Dockerfile in the repo now declares USER explicitly.
  - id: DS-0002
    paths:
      - "shared/microservice/Dockerfile"
      - "Dockerfile.dev"

  # DS-0011: "COPY with more than two arguments not ending with slash"
  #   Only triggers in scaffolds/ templates because of {{placeholder}} tokens
  #   that confuse trivy's parser. The scaffolds/ directory is excluded
  #   from the scan via --skip-dirs, so this is defense-in-depth.
  - id: DS-0011

vulnerabilities:
  # CVE-2026-33671: picomatch ReDoS via crafted extglob patterns
  #   Source: npm CLI's bundled `tinyglobby/node_modules/picomatch@4.0.3`
  #   inside the `node:*-alpine` base image — NOT part of the application's
  #   dependency tree (the lockfile resolves picomatch to 4.0.4 already).
  #   Production runtime invokes only `pnpm run start` → node, never npm,
  #   so the vulnerable picomatch path is unreachable. Drop this entry
  #   when the upstream `node:*-alpine` ships an npm with picomatch >= 4.0.4.
  - id: CVE-2026-33671

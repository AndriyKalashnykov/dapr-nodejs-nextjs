name: demo-ts

services:
  # Dapr placement service (actor placement)
  placement:
    image: "docker.io/daprio/dapr:1.17.6@sha256:1cf8b3e5445f74f5eb7f030f9b6827eca0ce089f30f0bb1ab81969b51b405f98"
    command: ["./placement", "-port", "50005"]
    ports:
      - "50005:50005"
    networks:
      - dapr-net
  # Dapr scheduler service (Jobs API / actor reminders, 1.14+)
  # tmpfs mount (not a named volume): the scheduler image runs as uid 65532
  # but named volumes land with root ownership on docker-compose, triggering
  # `mkdir /var/run/dapr/scheduler: permission denied` on CI. Scheduler state
  # is ephemeral for dev/test; tmpfs is in-memory, created with the
  # container user's ownership, and loses nothing we care about on restart.
  scheduler:
    image: "docker.io/daprio/dapr:1.17.6@sha256:1cf8b3e5445f74f5eb7f030f9b6827eca0ce089f30f0bb1ab81969b51b405f98"
    command: ["./scheduler", "--port", "50006", "--etcd-data-dir", "/var/run/dapr/scheduler"]
    ports:
      - "50006:50006"
    tmpfs:
      - /var/run/dapr/scheduler
    networks:
      - dapr-net
  # Dapr state and pubsub provider
  redis:
    image: "docker.io/redis:8-alpine@sha256:69f2c586c8a7e9cce4ae1ee9bbaf60bc4bb5f4bb3880e4ed022b1fd758a7cab9"
    restart: always
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "no", "--maxmemory", "500mb", "--maxmemory-policy", "allkeys-lru"]
    networks:
      - dapr-net
  # Dapr metrics provider
  zipkin:
    image: "docker.io/openzipkin/zipkin@sha256:d17e856dcbba7ffeefbbfc252f89ab78a4ab6faed47e646d46daad78f91b5ee2"
    ports:
      - "9411:9411"
    # TODO: Not working on Azure VM, causes service to crash
    # environment:
      # - JAVA_OPTS=-XX:UseSVE=0
    networks:
      - dapr-net
  # Dapr dashboard
  dapr-dashboard:
    image: "docker.io/daprio/dashboard:0.15.0@sha256:4be696707bd1349b49875f8e6da0d27dad742834483740d5a7897a73abeaf83d"
    command: [ "--docker-compose=true",
      "--components-path=/home/nonroot/components",
      "--config-path=/home/nonroot/config",
      "--docker-compose-path=/home/nonroot/docker-compose.yaml" ]
    ports:
      - "8888:8080"
    volumes:
      - "./components/:/home/nonroot/components"
      - "./config/:/home/nonroot/config"
      - ./docker-compose.yaml:/home/nonroot/docker-compose.yaml
    networks:
      - dapr-net

networks:
  dapr-net: # here we set the network name
    driver: bridge

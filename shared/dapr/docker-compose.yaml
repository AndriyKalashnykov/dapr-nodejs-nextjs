name: demo-ts

services:
  # Dapr placement service (actor placement)
  placement:
    image: "docker.io/daprio/dapr:1.17.5@sha256:a30a5b9089b7635b636587379a7c2086017fe1559d3f096d3f10326fafa22313"
    command: ["./placement", "-port", "50005"]
    ports:
      - "50005:50005"
    networks:
      - dapr-net
  # Dapr scheduler service (Jobs API / actor reminders, 1.14+)
  scheduler:
    image: "docker.io/daprio/dapr:1.17.5@sha256:a30a5b9089b7635b636587379a7c2086017fe1559d3f096d3f10326fafa22313"
    command: ["./scheduler", "--port", "50006", "--etcd-data-dir", "/var/run/dapr/scheduler"]
    ports:
      - "50006:50006"
    volumes:
      - scheduler-data:/var/run/dapr/scheduler
    networks:
      - dapr-net
  # Dapr state and pubsub provider
  redis:
    image: "docker.io/redis:8-alpine@sha256:81b6f81d6a6c5b9019231a2e8eb10085e3a139a34f833dcc965a8a959b040b72"
    restart: always
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "no", "--maxmemory", "500mb", "--maxmemory-policy", "allkeys-lru"]
    networks:
      - dapr-net
  # Dapr metrics provider
  zipkin:
    image: "docker.io/openzipkin/zipkin@sha256:d17e856dcbba7ffeefbbfc252f89ab78a4ab6faed47e646d46daad78f91b5ee2"
    ports:
      - "9411:9411"
    # TODO: Not working on Azure VM, causes service to crash
    # environment:
      # - JAVA_OPTS=-XX:UseSVE=0
    networks:
      - dapr-net
  # Dapr dashboard
  dapr-dashboard:
    image: "docker.io/daprio/dashboard:latest@sha256:4be696707bd1349b49875f8e6da0d27dad742834483740d5a7897a73abeaf83d"
    command: [ "--docker-compose=true",
      "--components-path=/home/nonroot/components",
      "--config-path=/home/nonroot/config",
      "--docker-compose-path=/home/nonroot/docker-compose.yaml" ]
    ports:
      - "8888:8080"
    volumes:
      - "./components/:/home/nonroot/components"
      - "./config/:/home/nonroot/config"
      - ./docker-compose.yaml:/home/nonroot/docker-compose.yaml
    networks:
      - dapr-net

networks:
  dapr-net: # here we set the network name
    driver: bridge

volumes:
  scheduler-data:

name: demo-ts

services:
  # Grafana OTEL collector, metrics, traces and logs. TODO: update dapr/config.yaml to wire this up
  grafana-otel:
    image: "docker.io/grafana/otel-lgtm@sha256:764b657d5c750a151fbe2f9acd8cd8edeec873b8f5e3179380d7d08b69797c2e"
    ports:
      - "3200:3000"
      - "4318:4318"
    volumes:
      - "./config/prometheus.yaml:/otel-lgtm/prometheus.yaml"
    networks:
      - dapr-net

networks:
  dapr-net: # here we set the network name
    driver: bridge

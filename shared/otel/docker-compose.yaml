name: demo-ts

services:
  # Grafana OTEL collector, metrics, traces and logs. TODO: update dapr/config.yaml to wire this up
  grafana-otel:
    image: "docker.io/grafana/otel-lgtm@sha256:fb550fc859490b1ee84d782b687ced21634f97c339b120659230683426afeb74"
    ports:
      - "3200:3000"
      - "4318:4318"
    volumes:
      - "./config/prometheus.yaml:/otel-lgtm/prometheus.yaml"
    networks:
      - dapr-net

networks:
  dapr-net: # here we set the network name
    driver: bridge

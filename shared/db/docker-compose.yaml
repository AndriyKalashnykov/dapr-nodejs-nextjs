name: demo-ts

services:
  # Shared db
  postgres:
    image: "docker.io/postgres:18-alpine@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7"
    ports:
      - "5432:5432"
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    volumes:
      - db-data:/var/lib/postgresql
    networks:
      - dapr-net
  
  postgres-build-dbs:
    image: "docker.io/postgres:18-alpine@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7"
    command: build-dbs.sh
    environment:
      PGPASSWORD: postgres
      POSTGRES_USER: postgres
      DB_NAMES: postgres,postgres2
      DB_SCHEMA_MAP: postgres:backend_ts,another_service;postgres2:backend_ts_test,another_service_test
    volumes:
      - ./build-dbs.sh:/usr/local/bin/build-dbs.sh
    depends_on:
      - postgres
    networks:
      - dapr-net
  
volumes:
  db-data:
  db:

networks:
  dapr-net: # here we set the network name
    driver: bridge

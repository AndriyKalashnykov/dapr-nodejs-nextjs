# gitleaks config — see https://github.com/gitleaks/gitleaks#configuration
#
# Extends the default ruleset and adds path-based allowlists for known
# false-positive sources in this repo:
#   - Next.js build artifacts (.next/) — generated, not source
#   - Test fixtures — JWTs forged with the well-known dev secret "secret"
#   - Scaffolds — copies of those test fixtures used as scaffold templates
#   - Documentation — example commands showing curl + sample JWTs

[extend]
useDefault = true

[allowlist]
description = "Project-specific allowlist"
# Patterns are anchored to allow both relative paths (`docs/foo.md`) and
# absolute paths (`/runner/work/.../docs/foo.md`) — gitleaks resolves
# `--source .` to absolute under some environments (act runners, CI agents)
# but reports relative paths locally. `(.*/)?` matches "anywhere in the
# tree" so the allowlist works on both.
paths = [
  '''(.*/)?\.next/.*''',
  '''(.*/)?node_modules/.*''',
  '''(.*/)?build/.*''',
  '''(.*/)?dist/.*''',
  '''(.*/)?coverage/.*''',
  '''(.*/)?\.git/.*''',
  '''(.*/)?[^/]*\.test\.ts$''',
  '''(.*/)?[^/]*\.integration\.test\.ts$''',
  '''(.*/)?[^/]*\.spec\.ts$''',
  '''(.*/)?scaffolds/.*''',
  '''(.*/)?docs/setup-azure-sandbox\.md$''',
  '''(.*/)?pnpm-lock\.yaml$''',
]

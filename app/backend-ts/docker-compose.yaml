name: demo-ts

services:
  ############################
  # backend app + Dapr sidecar
  ############################
  backend-ts:
    labels:
      - 'sos.service-type=microservice'
    build:
      dockerfile: ./Dockerfile.dev
    ports:
      - '3001:3001' # Backend direct (Swagger UI at http://localhost:3001/docs)
      - '3500:3500' # Dapr sidecar
    command: pnpm --filter backend-ts run dev
    environment:
      SERVICE_NAME: backend-ts
      NODE_ENV: development
      JWT_SECRET_KEY: secret
      SECRETS_KEY: serviceSecrets
      SECRETS_STORE_NAME: local-secretstore
      # SEED_DATA: true # Load seed data on start
      CHOKIDAR_USEPOLLING: true # Supports "tsx watch" for live reloading
      # DAPR_HOST = dial target for the SDK's outbound calls to the sidecar.
      # Must be localhost (sidecar is in the SAME network namespace via
      # network_mode: service:backend-ts). Using 0.0.0.0 works on rootless
      # Podman but fails on Docker Compose (CI), causing the
      # DAPR_SIDECAR_COULD_NOT_BE_STARTED error.
      DAPR_HOST: localhost
      DAPR_PORT: 3500
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: postgres
      DB_SCHEMA: backend_ts
      OTLP_ENDPOINT: http://grafana-otel:4318
      # DB_DEBUG: 1
      # DB_SSL: postgres # Production
    volumes:
      - /workspace/app/backend-ts/node_modules # Persist docker containers modules so that localhost are not used
      - ./src:/workspace/app/backend-ts/src
    depends_on:
      redis:
        condition: service_started
      placement:
        condition: service_started
      zipkin:
        condition: service_started
      postgres:
        condition: service_started
      # Wait for the one-shot schema-init container to complete before
      # running `knex migrate` — otherwise the `backend_ts` schema doesn't
      # exist yet and migrate fails with "schema \"backend_ts\" does not exist".
      postgres-build-dbs:
        condition: service_completed_successfully
    restart: on-failure
    networks:
      - dapr-net
  backend-ts-dapr:
    labels:
      - 'sos.service-type=microservice'
      - 'dapr.io/enabled=true' # Enable Dapr for this service
      - 'dapr.io/config=configstore'
    image: 'docker.io/daprio/daprd:1.17.5@sha256:46cbed2560e3fdd08ec9283ef6507ad5242c53508b751302e90f0112e29133d7'
    command:
      [
        './daprd',
        '--app-id',
        'backend-ts',
        '--app-port',
        '3001',
        '--config',
        '/configuration/config.yaml',
        '--dapr-http-port',
        '3500',
        '--enable-api-logging',
        '--enable-profiling',
        '--log-as-json',
        'true',
        '--placement-host-address',
        'placement:50005',
        '--profile-port',
        '7777',
        '--resources-path',
        '/components',
      ]
    volumes:
      - './dapr/components/:/components'
      - './dapr/config/:/configuration'
      - ./dapr/config/dev-secrets.json:/dev-secrets.json
    depends_on:
      - backend-ts
    network_mode: 'service:backend-ts'

networks:
  dapr-net: # here we set the network name
    driver: bridge

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_call:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Path filter ────────────────────────────────────────────────────────────
  # Detect whether the change touches code (vs. docs-only). Heavy jobs gate on
  # `needs.changes.outputs.code == 'true'` so doc-only PRs skip the build/test
  # matrix entirely while still passing the `ci-pass` gate (Repository Rulesets
  # require the workflow to RUN, not just to be skipped — see `/ci-workflow`
  # skill, "Path-Filter Strategy").
  changes:
    name: changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Detect code changes
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            code:
              - '**'
              - '!**.md'
              - 'CLAUDE.md'
              - '!docs/**'
              - '!specs/**'
              - '!LICENSE'
              - '!.gitignore'
              - '!.claudeignore'
              - '!.claude/**'
              - '!benchmarks/**'
              - '!**.png'
              - '!**.jpg'
              - '!**.gif'
              - '!**.svg'

  # ── Build (SDK compile + lint + test → upload artifact) ────────────────────
  build:
    name: build
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Resolve pnpm store path
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Build SDK
        run: make sdk-ci

      - name: Upload SDK build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        continue-on-error: true
        with:
          name: sdk-build
          path: packages/@sos/sdk/build
          retention-days: 1

  # ── Static check (lint + vulncheck + secrets + trivy-fs + mermaid-lint) ────
  static-check:
    name: static-check
    needs: [changes, build]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Resolve pnpm store path
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Download SDK build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sdk-build
          path: packages/@sos/sdk/build

      - name: Static check
        run: make static-check

  # ── Unit tests (backend) ───────────────────────────────────────────────────
  test:
    name: test
    needs: [changes, build]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Resolve pnpm store path
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Download SDK build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sdk-build
          path: packages/@sos/sdk/build

      - name: Run unit tests
        run: make backend-test
        env:
          SERVICE_NAME: backend-ts

  # ── Integration tests (backend + Postgres + Dapr sidecar) ──────────────────
  integration-test:
    name: integration-test
    needs: [changes, build]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:18-alpine@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Resolve pnpm store path
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Download SDK build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sdk-build
          path: packages/@sos/sdk/build

      - name: Set up Dapr CLI
        uses: dapr/setup-dapr@8d980918fd43a2765c143ce7f687665b2d46a6b9 # v2
        with:
          version: '1.17.0'

      - name: Bring up Dapr sidecar
        run: make ci-dapr-up

      - name: Prepare test schema
        run: make ci-db-prepare

      - name: Run integration tests
        run: make backend-test-integration
        env:
          NODE_ENV: test
          SERVICE_NAME: backend-ts
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_NAME: postgres
          DB_SCHEMA: backend_ts
          JWT_SECRET_KEY: secret
          DAPR_HOST: localhost
          DAPR_PORT: '3500'

  # ── Web (Next.js lint + test + production build) ───────────────────────────
  web-nextjs:
    name: web-nextjs
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Resolve pnpm store path
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Lint, test and build
        run: make web-nextjs-ci

  # ── E2E (full stack via docker compose) ────────────────────────────────────
  e2e:
    name: e2e
    needs: [changes, integration-test, web-nextjs]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Resolve pnpm store path
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Download SDK build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sdk-build
          path: packages/@sos/sdk/build

      # The e2e smoke script uses `node -e "require('jsonwebtoken')..."` to
      # forge a dev JWT. Install workspace deps on the runner so the require
      # resolves (containers have their own node_modules; the runner doesn't).
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build microservice base images
        run: |
          docker build ./shared/microservice -t microservice-build
          docker build -f Dockerfile.dev -t microservice-sdk-build .

      - name: Build service images
        run: docker compose build --parallel

      - name: Start stack
        run: docker compose up -d

      - name: Run end-to-end tests
        run: bash e2e/e2e-test.sh

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # ── Docker (build + Trivy scan, no push) ───────────────────────────────────
  # Builds the production Dockerfiles and scans the resulting images on every
  # push. Catches base-image CVEs, Dockerfile misconfigurations, and secret
  # leaks BEFORE they ship via the manual `e2e-aca` deploy. Images are not
  # pushed anywhere — actual registry pushes happen in `e2e-aca.yml`.
  docker:
    name: docker
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service: [backend-ts, web-nextjs]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build production image
        run: make image-build-prod
        env:
          SERVICE: ${{ matrix.service }}
          IMAGE_TAG: ${{ github.sha }}

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.service }}:${{ github.sha }}
          scanners: 'vuln,secret,misconfig'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: ./.trivyignore.yaml

  # ── Gate ───────────────────────────────────────────────────────────────────
  ci-pass:
    name: ci-pass
    if: always()
    needs: [changes, build, static-check, test, integration-test, web-nextjs, e2e, docker]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs failed or were cancelled"
            exit 1
          fi

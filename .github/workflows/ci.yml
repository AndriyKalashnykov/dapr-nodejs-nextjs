name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '*.md'
      - '!CLAUDE.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.claudeignore'
      - '.claude/**'
      - '**.png'
      - '**.jpg'
      - '**.gif'
      - '**.svg'
  pull_request:
    paths-ignore:
      - '*.md'
      - '!CLAUDE.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.claudeignore'
      - '.claude/**'
      - '**.png'
      - '**.jpg'
      - '**.gif'
      - '**.svg'
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Shared SDK ────────────────────────────────────────────────────────────────
  sdk:
    name: SDK compile, lint and test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Resolve pnpm store path
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Compile, lint & test
        run: make sdk-ci

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        continue-on-error: true
        with:
          name: sdk-build
          path: packages/@sos/sdk/build
          retention-days: 1

  # ── Backend ───────────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend lint and typecheck
    needs: sdk
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Resolve pnpm store path
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sdk-build
          path: packages/@sos/sdk/build

      - name: Lint & typecheck
        run: make backend-lint

  backend-unit:
    name: Backend unit tests
    needs: [sdk, backend-ci]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Resolve pnpm store path
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sdk-build
          path: packages/@sos/sdk/build

      - name: Unit tests
        run: make backend-test
        env:
          SERVICE_NAME: backend-ts

  backend-integration:
    name: Backend integration tests
    needs: [sdk, backend-ci]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:18-alpine@sha256:52098013b4b64a746626437d38afc03cabff6cdeb4d3d92e2342aa95f0ce56ea
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Resolve pnpm store path
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sdk-build
          path: packages/@sos/sdk/build

      - name: Install Dapr CLI
        uses: dapr/setup-dapr@8d980918fd43a2765c143ce7f687665b2d46a6b9 # v2
        with:
          version: '1.17.0'

      - name: Initialize Dapr (slim – no Docker needed)
        run: dapr init --slim

      # buildServiceContext() calls Secrets.get() → Dapr local-secretstore → this file
      - name: Configure Dapr local secretstore
        run: |
          mkdir -p "$HOME/.dapr/components"

          cat > "$HOME/.dapr/components/local-secretstore.yaml" <<'EOF'
          apiVersion: dapr.io/v1alpha1
          kind: Component
          metadata:
            name: local-secretstore
          spec:
            type: secretstores.local.file
            version: v1
            metadata:
              - name: secretsFile
                value: /home/runner/.dapr/secrets.json
              - name: nestedSeparator
                value: ':'
              - name: multiValued
                value: 'true'
          EOF

          cat > "$HOME/.dapr/secrets.json" <<'EOF'
          {
            "serviceSecrets": {
              "JWT_SECRET": "secret",
              "DB_USER": "postgres",
              "DB_PASSWORD": "postgres"
            }
          }
          EOF

      - name: Start Dapr sidecar
        run: |
          export PATH="$HOME/.dapr/bin:$PATH"
          daprd \
            --app-id backend-ts \
            --dapr-http-port 3500 \
            --resources-path "$HOME/.dapr/components" \
            --log-level error \
            > /tmp/daprd.log 2>&1 &
          echo "Waiting for Dapr sidecar on :3500..."
          timeout 30 bash -c \
            'until curl -sf http://localhost:3500/v1.0/healthz > /dev/null; do sleep 1; done' \
            || { echo "=== daprd log ==="; cat /tmp/daprd.log; exit 1; }

      - name: Create test schema
        run: psql -h localhost -U postgres -d postgres -c "CREATE SCHEMA IF NOT EXISTS backend_ts_test;"
        env:
          PGPASSWORD: postgres

      - name: Integration tests
        run: make backend-test-integration
        env:
          NODE_ENV: test
          SERVICE_NAME: backend-ts
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_NAME: postgres
          DB_SCHEMA: backend_ts
          JWT_SECRET_KEY: secret
          DAPR_HOST: localhost
          DAPR_PORT: '3500'

  # ── Frontends ─────────────────────────────────────────────────────────────────
  web-nextjs:
    name: Web Next.js lint, test and build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Resolve pnpm store path
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Lint & build
        run: make web-nextjs-ci

  # ── E2E ───────────────────────────────────────────────────────────────────
  e2e:
    name: E2E full-stack smoke test
    needs: [backend-integration, web-nextjs]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Resolve pnpm store path
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sdk-build
          path: packages/@sos/sdk/build

      # The e2e smoke script uses `node -e "require('jsonwebtoken')..."` to
      # forge a dev JWT. Install workspace deps on the runner so the require
      # resolves (containers have their own node_modules; the runner doesn't).
      - name: Install workspace dependencies for e2e script
        run: pnpm install --frozen-lockfile

      - name: Build microservice base images
        run: |
          docker build ./shared/microservice -t microservice-build
          docker build -f Dockerfile.dev -t microservice-sdk-build .

      - name: Build service images
        run: docker compose build --parallel

      - name: Start stack
        run: docker compose up -d

      - name: Run e2e smoke test
        run: bash e2e/e2e-test.sh

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # ── Gate ───────────────────────────────────────────────────────────────────
  ci-pass:
    if: always()
    needs: [sdk, backend-ci, backend-unit, backend-integration, web-nextjs, e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs failed or were cancelled"
            exit 1
          fi

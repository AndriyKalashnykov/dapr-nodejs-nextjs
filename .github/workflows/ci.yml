name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  # ── Shared SDK ────────────────────────────────────────────────────────────────
  sdk:
    name: SDK – compile, lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Compile, lint & test
        run: make sdk-ci

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v7
        with:
          name: sdk-build
          path: packages/@sos/sdk/build
          retention-days: 1

  # ── Backend ───────────────────────────────────────────────────────────────────
  backend-ci:
    name: Backend – lint & typecheck
    needs: sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sdk-build
          path: packages/@sos/sdk/build

      - name: Lint & typecheck
        run: make backend-lint

  backend-unit:
    name: Backend – unit tests
    needs: sdk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sdk-build
          path: packages/@sos/sdk/build

      - name: Unit tests
        run: make backend-test
        env:
          SERVICE_NAME: backend-ts

  backend-integration:
    name: Backend – integration tests
    needs: sdk
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: sdk-build
          path: packages/@sos/sdk/build

      - name: Install Dapr CLI
        uses: dapr/setup-dapr@v2
        with:
          version: '1.17.0'

      - name: Initialize Dapr (slim – no Docker needed)
        run: dapr init --slim

      # buildServiceContext() calls Secrets.get() → Dapr local-secretstore → this file
      - name: Configure Dapr local secretstore
        run: |
          mkdir -p "$HOME/.dapr/components"

          cat > "$HOME/.dapr/components/local-secretstore.yaml" <<'EOF'
          apiVersion: dapr.io/v1alpha1
          kind: Component
          metadata:
            name: local-secretstore
          spec:
            type: secretstores.local.file
            version: v1
            metadata:
              - name: secretsFile
                value: /home/runner/.dapr/secrets.json
              - name: nestedSeparator
                value: ':'
              - name: multiValued
                value: 'true'
          EOF

          cat > "$HOME/.dapr/secrets.json" <<'EOF'
          {
            "serviceSecrets": {
              "JWT_SECRET": "secret",
              "DB_USER": "postgres",
              "DB_PASSWORD": "postgres"
            }
          }
          EOF

      - name: Start Dapr sidecar
        run: |
          export PATH="$HOME/.dapr/bin:$PATH"
          daprd \
            --app-id backend-ts \
            --dapr-http-port 3500 \
            --resources-path "$HOME/.dapr/components" \
            --log-level error \
            > /tmp/daprd.log 2>&1 &
          echo "Waiting for Dapr sidecar on :3500..."
          timeout 30 bash -c \
            'until curl -sf http://localhost:3500/v1.0/healthz > /dev/null; do sleep 1; done' \
            || { echo "=== daprd log ==="; cat /tmp/daprd.log; exit 1; }

      - name: Create test schema
        run: psql -h localhost -U postgres -d postgres -c "CREATE SCHEMA IF NOT EXISTS backend_ts_test;"
        env:
          PGPASSWORD: postgres

      - name: Integration tests
        run: make backend-test-integration
        env:
          NODE_ENV: test
          SERVICE_NAME: backend-ts
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_NAME: postgres
          DB_SCHEMA: backend_ts
          JWT_SECRET_KEY: secret
          DAPR_HOST: localhost
          DAPR_PORT: '3500'

  # ── Frontends ─────────────────────────────────────────────────────────────────
  web-nextjs:
    name: Web (Next.js) – lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Lint & build
        run: make web-nextjs-ci

  web-react:
    name: Web (React) – lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Lint & build
        run: make web-react-ci

  # ── Gate ───────────────────────────────────────────────────────────────────
  ci-pass:
    name: CI ✓
    if: always()
    needs: [sdk, backend-ci, backend-unit, backend-integration, web-nextjs, web-react]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs failed or were cancelled"
            exit 1
          fi

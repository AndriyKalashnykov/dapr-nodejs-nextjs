name: E2E (ACA)

# Manual-only trigger. ACA deploys incur Azure cost (~$0.30–$1 per full run),
# and a run takes 10–20 min. Do not wire to push/PR.
on:
  workflow_dispatch:
    inputs:
      keep_resources:
        description: 'Skip terraform destroy (leave ACA running for debug). Default false.'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# OIDC federation: see docs/setup-azure-sandbox.md for how to configure
# the Azure AD app, federated credentials, and RBAC role assignments
# ("Contributor" on the subscription + "User Access Administrator" for role
# assignments inside the TF).
permissions:
  id-token: write     # required for OIDC
  contents: read

concurrency:
  group: e2e-aca       # serialize — single TF state backend, single RG
  cancel-in-progress: false

jobs:
  e2e-aca:
    name: Deploy to ACA, smoke, destroy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Secrets + vars required in repo settings:
      #   secrets.AZURE_CLIENT_ID        — AAD App (client) ID of the federated identity
      #   secrets.AZURE_TENANT_ID        — AAD tenant ID
      #   secrets.AZURE_SUBSCRIPTION_ID  — Target Azure subscription
      #   secrets.JWT_SECRET_KEY         — seeded into Key Vault; must match smoke JWT
      TF_VAR_AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_jwt_secret_key: ${{ secrets.JWT_SECRET_KEY }}
      ARM_USE_OIDC: 'true'
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Terraform init
        working-directory: infra/azure
        run: terraform init -input=false

      - name: Ensure ACR exists (targeted apply)
        working-directory: infra/azure
        run: terraform apply -input=false -auto-approve -target=module.container_registry

      - name: Read ACR login server
        id: acr
        working-directory: infra/azure
        run: echo "server=$(terraform output -raw container_registry_login_server)" >> "$GITHUB_OUTPUT"

      - name: ACR docker login
        run: az acr login --name "${ACR_NAME%%.*}"
        env:
          ACR_NAME: ${{ steps.acr.outputs.server }}

      # Build-scan-push for each image. Trivy runs between build and push so
      # a CRITICAL/HIGH CVE in the base image or a leaked secret blocks the
      # deploy to real Azure infra. `ignore-unfixed: true` skips CVEs with
      # no upstream fix available.
      - name: Build backend-ts image
        run: docker build -t "${ACR}/backend-ts:${GIT_SHA}" -f app/backend-ts/Dockerfile .
        env:
          ACR: ${{ steps.acr.outputs.server }}
          GIT_SHA: ${{ github.sha }}

      - name: Trivy image scan — backend-ts
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.acr.outputs.server }}/backend-ts:${{ github.sha }}
          scanners: 'vuln,secret,misconfig'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Push backend-ts image
        run: docker push "${ACR}/backend-ts:${GIT_SHA}"
        env:
          ACR: ${{ steps.acr.outputs.server }}
          GIT_SHA: ${{ github.sha }}

      - name: Build web-nextjs image
        run: docker build -t "${ACR}/web-nextjs:${GIT_SHA}" -f app/web-nextjs/Dockerfile app/web-nextjs
        env:
          ACR: ${{ steps.acr.outputs.server }}
          GIT_SHA: ${{ github.sha }}

      - name: Trivy image scan — web-nextjs
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.acr.outputs.server }}/web-nextjs:${{ github.sha }}
          scanners: 'vuln,secret,misconfig'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Push web-nextjs image
        run: docker push "${ACR}/web-nextjs:${GIT_SHA}"
        env:
          ACR: ${{ steps.acr.outputs.server }}
          GIT_SHA: ${{ github.sha }}

      - name: Terraform apply
        working-directory: infra/azure
        run: |
          terraform apply -input=false -auto-approve \
            -var "backend_image_tag=${GIT_SHA}" \
            -var "nextjs_image_tag=${GIT_SHA}"
        env:
          GIT_SHA: ${{ github.sha }}

      - name: Run ACA smoke test
        env:
          TF_DIR: infra/azure
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: bash e2e/e2e-aca.sh

      - name: Terraform destroy
        if: always() && inputs.keep_resources != 'true'
        working-directory: infra/azure
        run: |
          terraform destroy -input=false -auto-approve \
            -var "backend_image_tag=${GIT_SHA}" \
            -var "nextjs_image_tag=${GIT_SHA}"
        env:
          GIT_SHA: ${{ github.sha }}

      - name: Warn — resources kept
        if: inputs.keep_resources == 'true'
        run: |
          echo "::warning title=Azure resources kept::Skipped terraform destroy per input. Remember to manually destroy or the cost accrues."

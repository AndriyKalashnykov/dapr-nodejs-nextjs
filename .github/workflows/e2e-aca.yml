name: E2E ACA

# Manual-only trigger. ACA deploys incur Azure cost (~$0.30–$1 per full run),
# and a run takes 10–20 min. Do not wire to push/PR.
on:
  workflow_dispatch:
    inputs:
      keep_resources:
        description: "Skip terraform destroy (leave ACA running for debug). Default false."
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

# OIDC federation: see docs/setup-azure-sandbox.md for how to configure
# the Azure AD app, federated credentials, and RBAC role assignments
# ("Contributor" on the subscription + "User Access Administrator" for role
# assignments inside the TF).
permissions:
  id-token: write # required for OIDC (every job re-uses this)
  contents: read

concurrency:
  group: e2e-aca # serialize across all 3 jobs — single TF state backend
  cancel-in-progress: false

# Shared env block. Each job inherits the same Azure auth + TF vars; OIDC
# tokens are minted per-job so all 3 jobs include their own `azure/login`
# step. TF state is in a remote azurerm backend (see infra/azure/main.tf),
# so state flows from acr-bootstrap → publish (matrix) → deploy-and-smoke
# without explicit handoff.
env:
  TF_VAR_AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_jwt_secret_key: ${{ secrets.JWT_SECRET_KEY }}
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  # ── Phase 1: provision ACR, capture login server FQDN ─────────────────────
  # Single job that does the targeted `terraform apply -target=container_registry`
  # and emits the ACR login server FQDN as an output for downstream jobs.
  acr-bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      acr_server: ${{ steps.acr.outputs.server }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to Azure (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Provision ACR
        run: make tf-apply-acr

      - name: Read ACR login server
        id: acr
        run: echo "server=$(make tf-acr-login-server)" >> "$GITHUB_OUTPUT"

  # ── Phase 2: per-service build/scan/smoke/push/sign in parallel ───────────
  # Matrix-fans out the duplicated per-service step blocks. Each matrix entry:
  #   1. Builds single-arch image, scans with Trivy, smoke-tests it
  #   2. Builds multi-arch (amd64+arm64) and pushes to ACR
  #   3. Cosign-signs the published manifest digest (keyless OIDC)
  # Both services build in parallel — wall-clock = max(per-service), not sum.
  publish:
    needs: [acr-bootstrap]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service: [backend-ts, web-nextjs]
    env:
      ACR_SERVER: ${{ needs.acr-bootstrap.outputs.acr_server }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to Azure (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to ACR
        env:
          ACR_NAME: ${{ env.ACR_SERVER }}
        run: az acr login --name "${ACR_NAME%%.*}"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.ACR_SERVER }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=,format=long
          flavor: |
            latest=false

      # Pattern A gate 1 — single-arch load for scanning + smoke testing.
      - name: Build image for scan
        run: make image-build-prod
        env:
          SERVICE: ${{ matrix.service }}
          IMAGE_TAG: ${{ github.sha }}

      # Pattern A gate 2 — Trivy image scan.
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.service }}:${{ github.sha }}
          scanners: "vuln,secret,misconfig"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: ./.trivyignore.yaml

      # Pattern A gate 3 — boot the image and grep logs for the startup marker.
      - name: Smoke test
        run: make image-smoke-test
        env:
          SERVICE: ${{ matrix.service }}
          IMAGE_TAG: ${{ github.sha }}

      # Pattern A gate 4 — multi-arch build + push. ~95% cache-hit from the
      # scan build via type=gha. provenance/sbom both false to keep the OCI
      # image index free of `unknown/unknown` attestation entries.
      - name: Build and push
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: app/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Pattern A gate 5 — Cosign keyless OIDC signing by digest.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with cosign (keyless OIDC)
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "→ cosign sign ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${TAGS}"

  # ── Phase 3: full TF apply (ACA env + apps), smoke, destroy ───────────────
  deploy-and-smoke:
    needs: [publish]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to Azure (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up toolchain (mise)
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Terraform apply
        run: make tf-apply
        env:
          GIT_SHA: ${{ github.sha }}

      - name: Smoke test
        env:
          TF_DIR: infra/azure
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: bash e2e/e2e-aca.sh

      - name: Terraform destroy
        if: always() && inputs.keep_resources != 'true'
        run: make tf-destroy
        env:
          GIT_SHA: ${{ github.sha }}

      - name: Warn resources kept
        if: inputs.keep_resources == 'true'
        run: |
          echo "::warning title=Azure resources kept::Skipped terraform destroy per input. Remember to manually destroy or the cost accrues."
